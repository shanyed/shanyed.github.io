    <h1>解放之歌</h1>
    <div class="name" style="text-align: center;">D - 2024年11月11日</div>
    <!-- post-summary:start -->

    <p>
    <p style="text-align: left;"></p>

    如果可以的话<br>
    不要伤害他<br>
    也不要伤害我<br>
    <br>
    必要的话<br>
    要么伤害他<br>
    要么伤害我<br>
    <br>
    真的要抉择<br>
    你可以选择伤害我<br>
    如果这样你感觉会好的话<br>
    但是我只给你一次——伤害我的机会<br>
    那就是<br>
    你选择他的时候<br>
    <br>
    此刻<br>
    我所做过、经历过的一切都扑面而来<br>
    成了答案和满足<br>
    我心中既快乐又痛楚<br>
    </p>
